    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    text-rendering:optimizeLegibility;line-height:1.5;min-height:100dvh;overflow-x:hidden;padding-bottom:210px;

  .brand-mark::after{content:'';position:absolute;left:50%;bottom:-10px;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:var(--vibrant);box-shadow:0 0 0 1px rgba(26,25,23,.12)}

  .toast{position:fixed;left:50%;bottom:96px;transform:translate(-50%,12px);z-index:70;background:var(--ink);color:#fff;font-family:var(--inter);font-size:12.5px;letter-spacing:.04em;padding:11px 18px;opacity:0;pointer-events:none;transition:opacity var(--t-base) var(--ease),transform var(--t-base) var(--ease)}
  .toast.show{opacity:1;transform:translate(-50%,0)}

<script>
/* ── Share / QR panel. URL from canonical. Toast follows <html lang>;
   button labels are set by the page i18n (applyStatic). */
(function(){
  const SHARE_URL = document.querySelector('link[rel=canonical]')?.href || location.href;
  const SHARE_TITLE = document.title;
  const TOAST = { en: 'Link copied', nl: 'Link gekopieerd' };
  const lang = () => (document.documentElement.lang === 'nl' ? 'nl' : 'en');
  const modal = document.getElementById('share-modal');
  const openBtn = document.getElementById('share-btn');
  const closeBtn = document.getElementById('share-close');
  const copyBtn = document.getElementById('share-copy');
  const nativeBtn = document.getElementById('share-native');
  let lastFocus = null;

  const open = () => { lastFocus = document.activeElement; modal.hidden = false; document.body.style.overflow = 'hidden'; closeBtn.focus(); };
  const close = () => { modal.hidden = true; document.body.style.overflow = ''; (lastFocus || openBtn).focus(); };

  openBtn.addEventListener('click', open);
  closeBtn.addEventListener('click', close);
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && !modal.hidden) close(); });
  // Focus trap: keep Tab/Shift+Tab cycling inside the modal while open.
  modal.addEventListener('keydown', e => {
    if (e.key !== 'Tab' || modal.hidden) return;
    const els = Array.from(modal.querySelectorAll('button, [href], input, [tabindex]:not([tabindex="-1"])')).filter(el => !el.hidden && el.offsetParent !== null);
    if (!els.length) return;
    const first = els[0], last = els[els.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });

  copyBtn.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(SHARE_URL); toast(TOAST[lang()]); }
    catch(e) {
      const t = document.createElement('textarea'); t.value = SHARE_URL;
      t.style.position = 'fixed'; t.style.opacity = '0'; document.body.appendChild(t);
      t.select(); try { document.execCommand('copy'); toast(TOAST[lang()]); } catch(_) {}
      t.remove();
    }
  });

  if (navigator.share) {
    nativeBtn.hidden = false;
    nativeBtn.addEventListener('click', () => { navigator.share({ title: SHARE_TITLE, url: SHARE_URL }).catch(() => {}); });
  }

  let toastEl, toastTimer;
  function toast(msg){
    if (!toastEl){ toastEl = document.createElement('div'); toastEl.className = 'toast'; toastEl.setAttribute('role','status'); document.body.appendChild(toastEl); }
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }
})();
</script>

<script>
/* ============================================================
   SHOONYA DANCE CENTRE · LINK-IN-BIO
   Audience: shoonya — only shows events tagged 'shoonya' or 'both'.
   Auto-hides past events. Pinned: true forces an event to the hero.
   Events without a specific `image` fall back to a rotating photo
   from STYLE_POOLS based on their `style` tag.
   ============================================================ */

      dmAria: (t) => `${t} — stuur ons een DM op Instagram voor info`,
      badge: { FREE:'GRATIS', RSVP:'RESERVEREN', TICKET:'TICKET', DM:'DM', INFO:'INFO' },
      cta: { 'Reserve a spot':'Reserveer een plek', 'Free · just show up':'Gratis · kom langs', 'Free · sign up':'Gratis · schrijf je in', 'Free · join us':'Gratis · doe mee', 'Buy a ticket':'Koop een ticket' },
    },
  };
  const INITIAL_LANG = 'en';
  let LANG = (() => {
    try { const s = localStorage.getItem('sh_lang'); if (s === 'en' || s === 'nl') return s; } catch(e){}
    const q = new URLSearchParams(location.search).get('lang');
    if (q === 'nl' || q === 'en') return q;
    return INITIAL_LANG;
  })();
  const tr = () => T[LANG];

  // Image-uniqueness + round-robin fallback. Reset per paint() so picks stay
  // identical across language switches.
  let usedImages = new Set();
  let fallbackIdx = 0;
  const pickStyleImage = (style) => {
    const pool = STYLE_POOLS[style];
    if (!pool || !pool.length) return null;
    for (const photo of pool) { if (!usedImages.has(photo)) return photo; }
    return null;
  };
  const pickFallback = () => { const img = FALLBACK_IMAGES[fallbackIdx % FALLBACK_IMAGES.length]; fallbackIdx++; return img; };
  const isFallback = (img) => FALLBACK_IMAGES.indexOf(img) !== -1;
  const eventImage = (e) => {
    const img = e.image || pickStyleImage(e.style) || pickFallback();
    if (!isFallback(img)) usedImages.add(img);
    return img;
  };

  const ctaStatus = (e) => {
    if (!e.cta) return '';
    const s = e.cta.toLowerCase();
    if (s.includes('free') && s.includes('show up')) return 'FREE';
    if (s.includes('free') && s.includes('sign up')) return 'FREE';
    if (s.includes('reserve') || s.includes('rsvp') || s.includes('sign up')) return 'RSVP';
    if (s.includes('ticket')) return 'TICKET';
    if (s.includes('dm') || s.includes('programme') || s.includes('details')) return 'DM';
    return 'INFO';
  };
  const ctaBadgeHTML = (e) => {
    const status = ctaStatus(e);
    if (!status) return '';
    const lbl = tr().badge[status] || status;
    if (!e.url && status === 'DM') return `<span class="status-badge status-badge--dm-only">${lbl}</span>`;
    if (!e.url) return `<span class="status-badge">${lbl}</span>`;  // no [DM] suffix — free drop-ins read welcoming, not gated (the row still soft-links to DM)
    return `<span class="status-badge">${lbl}</span>`;
  };
  const ctaDisplay = (cta) => (cta && tr().cta[cta]) || cta || '';
  const linkURL = (e) => e.url || DM_URL;
  const ariaLabelFor = (e) => e.url ? e.title : tr().dmAria(e.title);

  const today = todayLocal();
  const visible = EVENTS
    .map(e => ({...e, _start: parseISO(e.date), _end: parseISO(e.endDate || e.date)}))
    .filter(e => e._end >= today)
    .filter(e => !e.audience || e.audience === AUDIENCE || e.audience === 'both')
    .sort((a,b) => a._start - b._start);

  const pinned = visible.find(e => e.pinned || (e.pinnedFor && e.pinnedFor.includes(AUDIENCE))) || visible[0];
  const rest = visible.filter(e => e !== pinned);

  // ─── Runtime Event JSON-LD — language-independent, built once ───
  (function injectEventLD(){
    const list = {
      "@context": "https://schema.org", "@type": "ItemList",
      "itemListElement": visible.map((e, i) => ({
        "@type": "ListItem", "position": i + 1,
        "item": {
          "@type": "Event", "name": e.title, "startDate": e.date,
          ...(e.endDate ? { "endDate": e.endDate } : {}),
          "url": e.url || DM_URL,
          "location": { "@type": "Place", "name": e.location || "Shoonya Dance Centre, Stapelplein 41, Gent" },
          "organizer": { "@type": "Organization", "name": "Shoonya Dance Centre" }
        }
      }))
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json'; s.id = 'events-ld';
    s.textContent = JSON.stringify(list);
    document.head.appendChild(s);
  })();

  let cdTimer = null;

  function paint(){
    usedImages = new Set(); fallbackIdx = 0;
    if (cdTimer){ clearInterval(cdTimer); cdTimer = null; }

    const $pinned = document.getElementById('pinned-slot');
    if (pinned){
      const opensIn = daysBetween(today, pinned._start);
      const isLive = pinned._start <= today;
      const liveTitle    = (isLive && pinned.titleLive)    ? pinned.titleLive    : pinned.title;
      const liveSubtitle = (isLive && pinned.subtitleLive) ? pinned.subtitleLive : pinned.subtitle;
      const liveDateLabel= (isLive && pinned.dateLabelLive)? pinned.dateLabelLive: pinned.dateLabel;
      const img = eventImage(pinned);
      const thumbHTML = img
        ? `<div class="featured-event-card__thumb"><img src="${img}" alt="${escapeHTML(pinned.title)}"></div>`
        : `<div class="featured-event-card__thumb placeholder" aria-hidden="true"></div>`;
      const liveBadge = pinned._start <= today && pinned._end >= today
        ? `<span class="pulse-dot" aria-hidden="true"></span> ${escapeHTML(tr().livePinned)}`
        : opensIn <= 7
          ? `<span class="pulse-dot" aria-hidden="true"></span> ${escapeHTML(tr().pinnedWeek)}`
          : `<span class="pulse-dot" aria-hidden="true"></span> ${escapeHTML(tr().pinned)}`;
      const countdownHTML = (opensIn > 0 && opensIn <= 60)
        ? `<div class="countdown" id="cd"><span class="lbl">${escapeHTML(tr().opensIn)}</span><span id="cd-val"></span></div>`
        : '';
      const subtitleHTML = liveSubtitle
        ? `<div class="featured-event-card__subtitle">${escapeHTML(liveSubtitle)}</div>`
        : '';
      const pinnedHref = linkURL(pinned);
      const ctaText = pinned.cta ? ctaDisplay(pinned.cta) : tr().seeDetails;
      const ctaHTML = `<div class="featured-event-card__cta">${escapeHTML(ctaText)}</div>`;

      $pinned.innerHTML = `
        <a class="featured-event-card" href="${pinnedHref}" target="_blank" rel="noopener" aria-label="${escapeHTML(ariaLabelFor(pinned))}">
          <div>
            <div class="featured-event-card__pinlbl">${liveBadge}</div>
            <h2 class="featured-event-card__title">${escapeHTML(liveTitle)}</h2>
            ${subtitleHTML}
            <div class="featured-event-card__meta">${escapeHTML(liveDateLabel)} · ${escapeHTML(pinned.location || '')}</div>
            ${countdownHTML}
            ${ctaHTML}
          </div>
          ${thumbHTML}
        </a>`;

      if (opensIn > 0 && opensIn <= 60){
        const tick = () => {
          const cv = document.getElementById('cd-val');
          if (!cv) return;
          const diff = pinned._start - new Date();
          if (diff <= 0){ cv.textContent = 'now'; return; }
          const d = Math.floor(diff/86400000);
          const h = Math.floor((diff%86400000)/3600000);
          const m = Math.floor((diff%3600000)/60000);
          cv.textContent = d>0 ? `${d}d ${h}h ${m}m` : `${h}h ${m}m`;
        };
        tick(); cdTimer = setInterval(tick, 60000);
      }
    } else {
      $pinned.innerHTML = '';
    }

    const $list = document.getElementById('event-list');
    if (rest.length === 0 && !pinned){
      $list.innerHTML = `<li class="empty">${escapeHTML(tr().empty)}</li>`;
    } else {
      let _vi = 0;  // visible top-level position — stagger off this, NOT the full-list index (group children inflate it → false blank ending)
      const renderRow = (e, i, inGroup) => {
        const inWeek = daysBetween(today, e._start) <= 7 && daysBetween(today, e._start) >= 0;
        const liveDot = inWeek ? `<span class="live" aria-label="this week"></span>` : '';
        const img = eventImage(e);
        const thumbHTML = img
          ? `<div class="link-row__thumb"><img src="${img}" alt="${escapeHTML(e.title)}" loading="lazy" decoding="async"></div>`
          : `<div class="link-row__thumb placeholder" aria-hidden="true"></div>`;
        const href = linkURL(e);
        const badgeHTML = ctaBadgeHTML(e);
        const arrowText = e.url ? '→' : 'Ask →';  // no-URL rows are a soft "got a question?" DM, not a booking step
        const rowClass = inGroup
          ? 'link-row link-row--thumb-right link-row--grouped'
          : 'link-row link-row--thumb-right';
        const anchor = `
          <a class="${rowClass}" href="${href}" target="_blank" rel="noopener" aria-label="${escapeHTML(ariaLabelFor(e))}">
            <div class="link-row__body">
              <div class="link-row__eyebrow">${badgeHTML}${liveDot}${escapeHTML(e.eyebrow)}</div>
              <div class="link-row__title">${escapeHTML(e.title)}</div>
              <div class="link-row__meta"><span>${escapeHTML([e.dateLabel, e.location].filter(Boolean).join(' · '))}</span><span class="link-row__meta-arrow" aria-hidden="true">${arrowText}</span></div>
            </div>
            ${thumbHTML}
          </a>`;
        if (inGroup) return anchor;
        const _d = 80 + Math.min(_vi, 8) * 40; _vi++;  // capped so trailing rows never wait ~1s
        return `<li style="animation-delay:${_d}ms">${anchor}</li>`;
      };

      const parts = [];
      let lastGroupId = null;
      rest.forEach((e, i) => {
        const enteringNew = e.group && e.group !== lastGroupId;
        const switchingOrLeaving = lastGroupId && (!e.group || e.group !== lastGroupId);
        if (switchingOrLeaving) parts.push('</div></details></li>');
        if (enteringNew && GROUPS[e.group]) {
          const g = GROUPS[e.group];
          const childCount = rest.filter(x => x.group === e.group).length;
          parts.push(`
            <li class="event-group">
              <details class="event-group__details">
                <summary class="event-group-header">
                  <span class="event-group-header__label">${escapeHTML(g.label)}</span>
                  <span class="event-group-header__date">${escapeHTML(g.dateLabel)}</span>
                  <span class="event-group-header__count">${childCount} workshop${childCount === 1 ? '' : 's'}</span>
                  <span class="event-group-header__chevron" aria-hidden="true">›</span>
                </summary>
                <div class="event-group__children">`);
        }
        lastGroupId = e.group || null;
        parts.push(renderRow(e, i, !!e.group));
      });
      if (lastGroupId) parts.push('</div></details></li>');
      $list.innerHTML = parts.join('');

      // Show only the first 5 rows; reveal the rest behind a "View more" button. Pinned hero is a separate slot and stays visible.
      const VM_LIMIT = 5;
      const vmRows = Array.from($list.children);
      if (vmRows.length > VM_LIMIT) {
        vmRows.slice(VM_LIMIT).forEach(li => li.classList.add('row-hidden'));
        const vmN = vmRows.length - VM_LIMIT;
        const vmLi = document.createElement('li');
        vmLi.className = 'view-more';
        const vmLabel = (document.documentElement.lang === 'nl') ? `Toon meer (${vmN}) →` : `View more (${vmN}) →`;
        vmLi.innerHTML = `<button type="button">${vmLabel}</button>`;
        $list.insertBefore(vmLi, vmRows[VM_LIMIT]);
        vmLi.querySelector('button').addEventListener('click', () => {
          vmRows.slice(VM_LIMIT).forEach(li => li.classList.remove('row-hidden'));
          vmLi.remove();
        });
      }
    }

    document.getElementById('footnote').innerHTML =
      `${visible.length} ${escapeHTML(tr().countWord)} · <a href="https://www.shoonyadance.com/calendar" target="_blank" rel="noopener">${escapeHTML(tr().fullCalendar)}</a>`;
  }

  // ─── Static chrome i18n (eyebrow, newsletter, share labels) + toggle ───
  function applyStatic(){
    document.documentElement.lang = LANG;
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
    set('eyebrow-label', tr().eyebrow);
    set('nl-title', tr().nlTitle);
    set('nl-body', tr().nlBody);
    set('nl-cta', tr().nlCta);
    set('share-title', tr().shareTitle);
    set('share-copy', tr().copyLink);
    set('share-download', tr().downloadQr);
    set('share-native', tr().shareVia);
    document.querySelectorAll('.lang-opt').forEach(b => {
      const on = b.dataset.lang === LANG;
      b.classList.toggle('is-on', on);
      b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
  }

  document.querySelectorAll('.lang-opt').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.lang === LANG) return;
      LANG = b.dataset.lang;
      try { localStorage.setItem('sh_lang', LANG); } catch(e){}
      applyStatic();
      paint();
    });
  });

  applyStatic();
  paint();
})();
</script>
</body>
</html>
